<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KolayCafe — Admin v2.1</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#0a0a0f;--bg2:#111118;--surface:#1a1a24;--surface2:#222230;--border:#2a2a3a;--text:#e8e8f0;--text2:#9090b0;--accent:#f0b940;--accent2:#e07840;--green:#30d080;--red:#e04050;--blue:#4080f0;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:200;}
  .topbar-logo{font-size:1rem;font-weight:800;color:var(--accent);}
  .tab-btn{padding:6px 15px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-weight:700;}
  .tab-btn.aktif{background:var(--accent);color:#000;}
  .sayfa{display:none;padding:20px;max-width:1400px;margin:0 auto;}.sayfa.aktif{display:block;}
  .tw{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;text-align:left;}
  th{background:var(--surface);padding:12px;font-size:0.7rem;color:var(--text2);text-transform:uppercase;}
  td{padding:12px;border-bottom:1px solid var(--border);font-size:0.85rem;}
  .badge{padding:3px 8px;border-radius:5px;font-size:0.7rem;font-weight:800;background:var(--surface2);}
  .status-off-tag { background: var(--red); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; margin-left:8px;}
  /* Switch */
  .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
  .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
  input:checked + .slider { background-color: var(--green); }
  input:checked + .slider:before { transform: translateX(16px); }
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;}
</style>
</head>
<body>

<div id="login-screen">
  <div style="background:var(--bg2); padding:40px; border-radius:20px; border:1px solid var(--border); text-align:center;">
    <h2 style="color:var(--accent); margin-bottom:20px;">KolayCafe Admin v2.1</h2>
    <input id="l-pass" type="password" placeholder="Şifre" style="padding:10px; border-radius:8px; border:1px solid var(--border); background:var(--bg); color:#fff; margin-bottom:10px;"><br>
    <button onclick="giris()" style="padding:10px 20px; border-radius:8px; background:var(--accent); border:none; font-weight:800; cursor:pointer;">Giriş</button>
  </div>
</div>

<div id="admin-panel" style="display:none;">
  <div class="topbar">
    <div class="topbar-logo">☕ ADMIN v2.1</div>
    <button class="tab-btn aktif" onclick="tab(this,'uyeler')">Üyeler</button>
    <button class="tab-btn" onclick="tab(this,'canli')">Canlı (5sn)</button>
    <button onclick="location.reload()" style="margin-left:auto; background:none; border:none; color:var(--text2); cursor:pointer;">🔄 Yenile</button>
  </div>

  <div id="uyeler" class="sayfa aktif">
    <div class="tw">
      <table>
        <thead><tr><th>#</th><th>KAFE ADI</th><th>PLAN</th><th>HİZMET ŞALTERİ</th><th>GARSONLAR</th><th>KALAN</th></tr></thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>
  </div>

  <div id="canli" class="sayfa">
    <div id="c-liste"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://sjfcdthwlwmbdmcevobv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqZmNkdGh3bHdtYmRtY2V2b2J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MDA3OTYsImV4cCI6MjA4NzM3Njc5Nn0.B--4Quy58qdU1IK48U-pr25hKoesqViMR0QvxNBiRbs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function giris(){ if(document.getElementById('l-pass').value === 'admin123'){ document.getElementById('login-screen').style.display='none'; document.getElementById('admin-panel').style.display='block'; yukle(); } }

function tab(btn, id){ 
  document.querySelectorAll('.sayfa').forEach(s=>s.classList.remove('aktif')); 
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('aktif'));
  document.getElementById(id).classList.add('aktif'); btn.classList.add('aktif');
  if(id==='canli') canliBaslat(); else clearInterval(window.cInterval);
}

async function yukle(){
  const { data } = await sb.from('kafeler').select('*').order('created_at',{ascending:false});
  const tbody = document.getElementById('t-body'); tbody.innerHTML = '';
  data.forEach((k,i)=>{
    const bitis = new Date(k.plan_bitis); const kalan = Math.ceil((bitis-new Date())/(1000*60*60*24));
    const garsonlar = Array.isArray(k.garsonlar) ? k.garsonlar.map(g=> typeof g === 'object' ? g.ad : g).join(', ') : '—';
    tbody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td><strong>${k.kafe_adi||'—'}</strong>${k.hizmet_aktif===false?'<span class="status-off-tag">KAPALI</span>':''}</td>
        <td><span class="badge">${(k.plan||'deneme').toUpperCase()}</span></td>
        <td>
          <label class="switch">
            <input type="checkbox" ${k.hizmet_aktif!==false?'checked':''} onchange="salter('${k.id}',this.checked)">
            <span class="slider"></span>
          </label>
        </td>
        <td style="font-size:0.7rem; color:var(--text2)">${garsonlar}</td>
        <td style="color:${kalan<=0?'var(--red)':'var(--green)'}">${kalan<=0?'Süre Doldu':kalan+' gün'}</td>
      </tr>`;
  });
}

async function salter(id, durum){ await sb.from('kafeler').update({hizmet_aktif:durum}).eq('id',id); yukle(); }

function canliBaslat(){ 
  canliYukle(); 
  window.cInterval = setInterval(canliYukle, 5000); 
}

async function canliYukle(){
  const { data } = await sb.from('kafeler').select('*');
  const online = data.filter(k=> k.son_giris && (new Date()-new Date(k.son_giris)) < 600000);
  const div = document.getElementById('c-liste');
  div.innerHTML = online.map(k=>`
    <div style="background:var(--bg2); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border)">
      <strong>☕ ${k.kafe_adi}</strong> - <span style="color:var(--green)">${(k.aktif_masalar||[]).length} Masa Açık</span>
    </div>`).join('') || 'Aktif kafe yok.';
}
</script>
</body>
</html>
