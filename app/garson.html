<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KolayCafe — Garson</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#1a0f00; --bg2:#241508; --surface:#2e1c0a; --surface2:#382212;
    --border:#4a2e10; --text:#f5e6d0; --muted:#8a6a40; --accent:#f0b940;
    --green:#22c55e; --danger:#ef4444; --blue:#3b82f6; --orange:#f97316;
    --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

  /* ── GİRİŞ ── */
  .giris-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
  .giris-logo{font-size:2rem;margin-bottom:6px;}
  .giris-baslik{font-size:1.4rem;font-weight:900;color:var(--accent);margin-bottom:4px;}
  .giris-sub{font-size:0.8rem;color:var(--muted);font-weight:700;margin-bottom:28px;}
  .giris-kart{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;}
  .g-label{font-size:0.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
  .g-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:12px 14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;outline:none;margin-bottom:14px;transition:border-color .2s;}
  .g-inp:focus{border-color:var(--accent);}
  .g-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#1a0f00;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;margin-top:4px;}
  .g-btn:active{opacity:.85;}
  .g-err{color:var(--danger);font-size:0.82rem;font-weight:700;margin-top:8px;display:none;text-align:center;}

  /* PIN grid */
  .pin-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0 14px;}
  .pin-dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:background .15s;}
  .pin-dot.dolu{background:var(--accent);}
  .pin-display{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
  .numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
  .np-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px;font-size:1.1rem;font-weight:900;color:var(--text);cursor:pointer;text-align:center;}
  .np-btn:active{background:var(--surface2);}
  .np-btn.del{color:var(--danger);}

  /* ── HEADER ── */
  .header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .h-sol{display:flex;align-items:center;gap:10px;}
  .h-logo{font-size:1.1rem;font-weight:900;color:var(--accent);}
  .h-kafe{font-size:0.75rem;color:var(--muted);font-weight:700;}
  .h-garson{font-size:0.78rem;font-weight:800;background:var(--surface);padding:4px 10px;border-radius:8px;border:1px solid var(--border);}
  .cikis-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 11px;color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;cursor:pointer;}

  /* ── TABS ── */
  .tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;}
  .tab{padding:11px 18px;font-size:0.8rem;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
  .tab.aktif{color:var(--accent);border-bottom-color:var(--accent);}

  /* ── MASALAR LİSTESİ ── */
  .sayfa{padding:14px;display:none;padding-bottom:80px;}
  .sayfa.aktif{display:block;}

  .masa-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:500px){.masa-grid{grid-template-columns:repeat(3,1fr);}}

  .masa-kart{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);padding:14px;cursor:pointer;transition:all .2s;position:relative;}
  .masa-kart.dolu{border-color:var(--accent);background:var(--surface2);}
  .masa-kart.bos{opacity:.7;}
  .masa-no{font-size:1.8rem;font-weight:900;color:var(--accent);text-align:center;line-height:1;}
  .masa-ad{font-size:0.72rem;font-weight:700;color:var(--muted);text-align:center;margin-top:2px;}
  .masa-tutar{font-size:0.85rem;font-weight:900;color:var(--green);text-align:center;margin-top:6px;}
  .masa-siparis-sayisi{position:absolute;top:8px;right:8px;background:var(--accent);color:#1a0f00;border-radius:50%;width:20px;height:20px;font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;}
  .masa-garson{font-size:0.68rem;color:var(--muted);text-align:center;margin-top:3px;}

  /* ── MASA DETAY ── */
  .geri-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--accent);font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:800;cursor:pointer;padding:0;margin-bottom:14px;}
  .masa-detay-baslik{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .masa-detay-adi{font-size:1.2rem;font-weight:900;color:var(--accent);}
  .masa-toplam-chip{background:var(--green);color:#fff;padding:5px 12px;border-radius:8px;font-size:0.85rem;font-weight:900;}

  /* Sipariş listesi */
  .siparis-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface);border-radius:10px;margin-bottom:7px;}
  .sp-sol{display:flex;align-items:center;gap:8px;}
  .sp-adet{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;font-size:0.8rem;font-weight:900;color:var(--accent);}
  .sp-isim{font-size:0.88rem;font-weight:800;}
  .sp-fiyat{font-size:0.85rem;font-weight:900;color:var(--green);}
  .sp-sil{background:none;border:none;color:var(--danger);font-size:1rem;cursor:pointer;padding:4px;}

  /* Ürün ekle */
  .urun-ekle-btn{width:100%;padding:12px;border-radius:12px;border:2px dashed var(--border);background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:0.88rem;cursor:pointer;margin-top:8px;margin-bottom:14px;}
  .urun-ekle-btn:hover{border-color:var(--accent);color:var(--accent);}

  /* Ödeme butonları */
  .odeme-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
  .odeme-btn{padding:13px;border-radius:12px;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.9rem;cursor:pointer;}
  .odeme-nakit{background:var(--green);color:#fff;}
  .odeme-kart{background:var(--blue);color:#fff;}
  .odeme-btn:active{opacity:.85;}
  .masa-not-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;outline:none;resize:none;margin-bottom:10px;}
  .masa-not-inp:focus{border-color:var(--accent);}

  /* ── ÜRÜN SEÇİCİ MODAL ── */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:none;justify-content:flex-end;flex-direction:column;}
  .modal-overlay.ac{display:flex;}
  .modal-kart{background:var(--bg2);border-radius:20px 20px 0 0;border-top:2px solid var(--border);height:72vh;display:flex;flex-direction:column;}
  .modal-header{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
  .modal-baslik{font-size:1rem;font-weight:900;color:var(--text);}
  .modal-kapat{background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer;}
  .modal-icerik{overflow-y:auto;padding:14px;flex:1;-webkit-overflow-scrolling:touch;}

  /* Kategori tabs (modal) */
  .modal-kat-tabs{display:flex;gap:7px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px;scrollbar-width:none;}
  .modal-kat-tabs::-webkit-scrollbar{display:none;}
  .mkat{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Nunito',sans-serif;font-size:0.75rem;font-weight:800;cursor:pointer;white-space:nowrap;}
  .mkat.aktif{background:var(--accent);border-color:var(--accent);color:#1a0f00;}

  /* Ürün listesi (modal) */
  .modal-urun-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  @media(min-width:400px){.modal-urun-grid{grid-template-columns:repeat(3,1fr);}}
  .modal-urun{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:10px;text-align:center;cursor:pointer;transition:all .15s;position:relative;}
  .modal-urun:active{background:var(--surface2);}
  .modal-urun.secili{border-color:var(--accent);background:var(--surface2);}
  .mu-ikon{font-size:1.6rem;line-height:1;margin-bottom:4px;}
  .mu-isim{font-size:0.75rem;font-weight:800;color:var(--text);}
  .mu-fiyat{font-size:0.72rem;font-weight:700;color:var(--accent);}
  .mu-adet-badge{position:absolute;top:5px;right:5px;background:var(--accent);color:#1a0f00;border-radius:50%;width:18px;height:18px;font-size:0.6rem;font-weight:900;display:flex;align-items:center;justify-content:center;}
  .modal-ekle-btn{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#1a0f00;font-family:'Nunito',sans-serif;font-weight:900;font-size:0.95rem;cursor:pointer;margin-top:14px;}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 22px;border-radius:12px;font-weight:800;font-size:0.85rem;z-index:9999;border:1px solid var(--border);opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
  .toast.goster{opacity:1;}

  /* Boş durum */
  .bos-durum{text-align:center;padding:40px 20px;color:var(--muted);}
  .bos-ikon{font-size:2.5rem;margin-bottom:10px;}
  .bos-yazi{font-size:0.88rem;font-weight:700;}

  /* Adet seçici */
  .adet-sec{display:flex;align-items:center;gap:10px;justify-content:center;margin:10px 0;}
  .adet-btn{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;width:36px;height:36px;font-size:1.1rem;font-weight:900;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .adet-sayi{font-size:1.2rem;font-weight:900;min-width:28px;text-align:center;color:var(--accent);}

  /* Realtime göstergesi */
  .rt-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
  .rt-dot.bekle{background:var(--muted);box-shadow:none;animation:pulse 1.5s infinite;}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- ════════════════════ GİRİŞ ════════════════════ -->
<div id="giris-ekrani">
  <div class="giris-wrap">
    <div class="giris-logo">☕</div>
    <div class="giris-baslik">KolayCafe</div>
    <div class="giris-sub">Garson Girişi</div>

    <div class="giris-kart" id="adim-kafe">
      <div class="g-label">Cafe Kodu</div>
      <input class="g-inp" id="inp-kafe-kodu" type="text" placeholder="Cafe adı kodunu girin" autocomplete="off" autocapitalize="characters">
      <button class="g-btn" onclick="kafeBul()">Devam →</button>
      <div class="g-err" id="kafe-err"></div>
    </div>

    <div class="giris-kart" id="adim-garson" style="display:none;">
      <div style="font-size:0.85rem;font-weight:800;color:var(--muted);margin-bottom:14px;" id="kafe-adi-goster"></div>
      <div class="g-label">Garson Seç</div>
      <div id="garson-listesi" style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px;"></div>
      <div class="g-err" id="garson-err"></div>
    </div>

    <div class="giris-kart" id="adim-pin" style="display:none;">
      <div style="font-size:0.85rem;font-weight:800;color:var(--muted);margin-bottom:6px;" id="pin-kimin"></div>
      <div class="g-label" style="text-align:center;">PIN Kodu</div>
      <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="pd0"></div>
        <div class="pin-dot" id="pd1"></div>
        <div class="pin-dot" id="pd2"></div>
        <div class="pin-dot" id="pd3"></div>
        <div class="pin-dot" id="pd4"></div>
      </div>
      <div class="numpad">
        <button class="np-btn" onclick="pinTus('1')">1</button>
        <button class="np-btn" onclick="pinTus('2')">2</button>
        <button class="np-btn" onclick="pinTus('3')">3</button>
        <button class="np-btn" onclick="pinTus('4')">4</button>
        <button class="np-btn" onclick="pinTus('5')">5</button>
        <button class="np-btn" onclick="pinTus('6')">6</button>
        <button class="np-btn" onclick="pinTus('7')">7</button>
        <button class="np-btn" onclick="pinTus('8')">8</button>
        <button class="np-btn" onclick="pinTus('9')">9</button>
        <button class="np-btn del" onclick="pinSil()">←</button>
        <button class="np-btn" onclick="pinTus('0')">0</button>
        <button class="np-btn" onclick="pinTemizle()" style="font-size:0.7rem;">Sil</button>
      </div>
      <div class="g-err" id="pin-err"></div>
    </div>
  </div>
</div>

<!-- ════════════════════ ANA UYGULAMA ════════════════════ -->
<div id="ana-ekran" style="display:none;">

  <div class="header">
    <div class="h-sol">
      <div class="rt-dot bekle" id="rt-dot"></div>
      <div>
        <div class="h-logo">☕ KolayCafe</div>
        <div class="h-kafe" id="h-kafe-adi">—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="h-garson" id="h-garson-adi">👤 —</div>
      <button class="cikis-btn" onclick="cikisYap()">Çıkış</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab aktif" id="tab-masalar" onclick="tabDegis('masalar')">🪑 Masalar</div>
    <div class="tab" id="tab-tum" onclick="tabDegis('tum')">📋 Tüm Siparişler</div>
  </div>

  <!-- MASALAR SEKMESİ -->
  <div class="sayfa aktif" id="sayfa-masalar">
    <div id="masa-liste-ekrani">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:0.8rem;font-weight:800;color:var(--muted);" id="masa-ozet">Yükleniyor...</div>
      </div>
      <div class="masa-grid" id="masa-grid"></div>
    </div>

    <!-- Masa detay ekranı -->
    <div id="masa-detay-ekrani" style="display:none;">
      <button class="geri-btn" onclick="geriDon()">← Masalara Dön</button>
      <div class="masa-detay-baslik">
        <div class="masa-detay-adi" id="detay-masa-adi">—</div>
        <div class="masa-toplam-chip" id="detay-toplam">0 ₺</div>
      </div>

      <div style="margin-bottom:10px;">
        <textarea class="masa-not-inp" id="masa-not-inp" placeholder="Masa notu (ör: pencere kenarı, bebek koltuğu...)" rows="2"></textarea>
      </div>

      <div id="siparis-liste"></div>

      <button class="urun-ekle-btn" onclick="urunModalAc()">+ Ürün / İçecek Ekle</button>

      <div style="font-size:0.78rem;font-weight:800;color:var(--muted);margin-bottom:8px;">Hesabı Kapat:</div>
      <div class="odeme-row">
        <button class="odeme-btn odeme-nakit" onclick="hesapKapat('salon-nakit')">💵 Nakit</button>
        <button class="odeme-btn odeme-kart" onclick="hesapKapat('salon-kart')">💳 Kart</button>
      </div>
    </div>
  </div>

  <!-- TÜM SİPARİŞLER SEKMESİ -->
  <div class="sayfa" id="sayfa-tum">
    <div id="tum-siparis-liste"></div>
  </div>

</div>

<!-- ════════════════════ ÜRÜN MODAL ════════════════════ -->
<div class="modal-overlay" id="urun-modal" onclick="modalDisi(event)">
  <div class="modal-kart">
    <div class="modal-header">
      <div class="modal-baslik">Ürün Ekle</div>
      <button class="modal-kapat" onclick="urunModalKapat()">✕</button>
    </div>
    <div class="modal-icerik">
      <div class="modal-kat-tabs" id="modal-kat-tabs"></div>
      <div class="modal-urun-grid" id="modal-urun-grid"></div>

      <div class="adet-sec" id="adet-sec" style="display:none;">
        <button class="adet-btn" onclick="adetDegis(-1)">−</button>
        <div class="adet-sayi" id="adet-sayi">1</div>
        <button class="adet-btn" onclick="adetDegis(1)">+</button>
      </div>

      <button class="modal-ekle-btn" id="modal-ekle-btn" style="display:none;" onclick="urunEkleOnayla()">Ekle →</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://sjfcdthwlwmbdmcevobv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqZmNkdGh3bHdtYmRtY2V2b2J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MDA3OTYsImV4cCI6MjA4NzM3Njc5Nn0.B--4Quy58qdU1IK48U-pr25hKoesqViMR0QvxNBiRbs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────
let kafeId = null;
let kafeKod = '';
let kafeAdi = '';
let aktifGarson = '';
let aktifGarsonPin = '';
let garsonListesi = [];
let URUNLER = {};
let masalar = [];       // pakete göre sayı
let aktifMasalar = [];  // Supabase'den gelen dolu masalar
let aktifMasaId = null;
let seciliUrun = null;
let seciliUrunAdet = 1;
let aktifModalKat = '';
let channel = null;

const fmt = v => (v||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' ₺';

// ── TOAST ──────────────────────────────────────
function toast(m, sure=2200) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('goster');
  setTimeout(() => t.classList.remove('goster'), sure);
}

// ── GİRİŞ ADIMLARI ────────────────────────────
async function kafeBul() {
  const kod = document.getElementById('inp-kafe-kodu').value.trim();
  if (!kod) { hataGoster('kafe-err', 'Kafe kodu girin!'); return; }
  hataGoster('kafe-err', '');

  const {data, error} = await sb.from('kafeler')
    .select('id, kafe_adi, garsonlar, urunler, aktif_masalar, masalar, plan')
    .ilike('kafe_kodu', kod)
    .single();

  if (error || !data) { hataGoster('kafe-err', '❌ Cafe bulunamadı!'); return; }

  kafeId = data.id;
  kafeKod = kod;
  kafeAdi = data.kafe_adi || 'Kafem';
  URUNLER = data.urunler || {};
  garsonListesi = (data.garsonlar || []).map(g =>
    typeof g === 'string' ? {isim: g, pin: '', aktif: true} : g
  ).filter(g => g.aktif !== false);

  // Masa sayısını plan'dan belirle
  const MASA_SAYILARI = {deneme:6, start:4, grow:6, gold:8, platin:10, ultra:12, elite:15, pro:999, ucretsiz:6};
  const masaSayisi = MASA_SAYILARI[data.plan] || 6;
  const _kayitliMasalar = data.masalar || [];
  masalar = Array.from({length: masaSayisi >= 999 ? 20 : masaSayisi}, (_,i) => {
    const k = _kayitliMasalar.find(x => x.id === i+1);
    return {id: i+1, ad: k?.ad || 'Masa ' + (i+1)};
  });

  if (garsonListesi.length === 0) { hataGoster('kafe-err', '⚠️ Bu kafede garson eklenmemiş.'); return; }

  // URL'de masa parametresi varsa direkt masaya git (QR akışı)
  const urlParams = new URLSearchParams(window.location.search);
  const qrMasa = urlParams.get('masa');

  document.getElementById('adim-kafe').style.display = 'none';
  document.getElementById('kafe-adi-goster').textContent = '☕ ' + kafeAdi;

  // Garson listesini render et
  const gl = document.getElementById('garson-listesi');
  gl.innerHTML = garsonListesi.map((g, i) => `
    <button onclick="garsonSec(${i})"
      style="padding:12px 16px;background:var(--surface);border:1.5px solid var(--border);
             border-radius:11px;color:var(--text);font-family:'Nunito',sans-serif;
             font-size:0.9rem;font-weight:800;cursor:pointer;text-align:left;">
      👤 ${g.isim}
    </button>`).join('');

  document.getElementById('adim-garson').style.display = 'block';

  if (qrMasa) {
    window._qrMasaId = parseInt(qrMasa);
  }
}

let _seciliGarsonIdx = -1;

function garsonSec(idx) {
  _seciliGarsonIdx = idx;
  const g = garsonListesi[idx];
  if (g.pin && g.pin.length > 0) {
    // PIN gerekiyor
    document.getElementById('adim-garson').style.display = 'none';
    document.getElementById('pin-kimin').textContent = '👤 ' + g.isim + ' — PIN girin';
    document.getElementById('adim-pin').style.display = 'block';
    _pinGirilen = '';
    pinGoster();
  } else {
    // PIN yok, direkt giriş
    girisYap(g.isim, '');
  }
}

let _pinGirilen = '';

function pinTus(d) {
  if (_pinGirilen.length >= 5) return;
  _pinGirilen += d;
  pinGoster();
  if (_pinGirilen.length === 5) {
    setTimeout(() => pinKontrol(), 200);
  }
}

function pinSil() {
  _pinGirilen = _pinGirilen.slice(0, -1);
  pinGoster();
}

function pinTemizle() {
  _pinGirilen = '';
  pinGoster();
}

function pinGoster() {
  for (let i = 0; i < 5; i++) {
    const d = document.getElementById('pd' + i);
    if (d) d.className = 'pin-dot' + (i < _pinGirilen.length ? ' dolu' : '');
  }
}

function pinKontrol() {
  const g = garsonListesi[_seciliGarsonIdx];
  if (_pinGirilen === g.pin) {
    girisYap(g.isim, _pinGirilen);
  } else {
    hataGoster('pin-err', '❌ PIN hatalı!');
    _pinGirilen = '';
    pinGoster();
    setTimeout(() => hataGoster('pin-err', ''), 2000);
  }
}

async function girisYap(isim, pin) {
  aktifGarson = isim;
  aktifGarsonPin = pin;

  document.getElementById('giris-ekrani').style.display = 'none';
  document.getElementById('ana-ekran').style.display = 'block';
  document.getElementById('h-kafe-adi').textContent = kafeAdi;
  document.getElementById('h-garson-adi').textContent = '👤 ' + isim;

  await yukle();
  baglan();

  // QR'dan geldiyse direkt masayı aç
  if (window._qrMasaId) {
    setTimeout(() => masaAc(window._qrMasaId), 500);
    window._qrMasaId = null;
  }
}

function hataGoster(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

// ── VERİ YÜKLEME ──────────────────────────────
async function yukle() {
  const {data} = await sb.from('kafeler')
    .select('aktif_masalar')
    .eq('id', kafeId).single();
  if (data) {
    aktifMasalar = data.aktif_masalar || [];
  }
  masaGridRender();
  tumSiparisRender();
}

// ── REALTIME ──────────────────────────────────
function baglan() {
  const dot = document.getElementById('rt-dot');
  channel = sb.channel('garson-' + kafeId)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public',
      table: 'kafeler', filter: 'id=eq.' + kafeId
    }, (payload) => {
      aktifMasalar = payload.new.aktif_masalar || [];
      masaGridRender();
      tumSiparisRender();
      // Detayda açık masa güncellensin
      if (aktifMasaId) masaDetayRender(aktifMasaId);
      toast('🔄 Güncellendi');
    })
    .subscribe((status) => {
      if (status === 'SUBSCRIBED') {
        if (dot) { dot.className = 'rt-dot'; }
      }
    });
}

// ── MASA GRİD ─────────────────────────────────
function masaGridRender() {
  const grid = document.getElementById('masa-grid');
  const doluSayisi = aktifMasalar.length;
  document.getElementById('masa-ozet').textContent =
    `${doluSayisi} dolu / ${masalar.length} masa`;

  grid.innerHTML = masalar.map(m => {
    const am = aktifMasalar.find(x => x.id === m.id);
    const dolu = !!am;
    const toplam = dolu ? (am.siparisler || []).reduce((s,sp) => s + (sp.fiyat * sp.adet), 0) : 0;
    const spSayisi = dolu ? (am.siparisler || []).length : 0;
    const garsonYazi = am?.garson ? `👤 ${am.garson}` : '';

    return `<div class="masa-kart ${dolu ? 'dolu' : 'bos'}" onclick="masaAc(${m.id})">
      ${spSayisi > 0 ? `<div class="masa-siparis-sayisi">${spSayisi}</div>` : ''}
      <div class="masa-no">${m.id}</div>
      <div class="masa-ad">${m.ad}</div>
      ${dolu ? `<div class="masa-tutar">${fmt(toplam)}</div>` : '<div style="font-size:0.7rem;color:var(--muted);text-align:center;margin-top:6px;">Boş</div>'}
      ${garsonYazi ? `<div class="masa-garson">${garsonYazi}</div>` : ''}
    </div>`;
  }).join('');
}

// ── TÜM SİPARİŞLER ────────────────────────────
function tumSiparisRender() {
  const el = document.getElementById('tum-siparis-liste');
  if (!aktifMasalar.length) {
    el.innerHTML = '<div class="bos-durum"><div class="bos-ikon">🪑</div><div class="bos-yazi">Şu an açık masa yok</div></div>';
    return;
  }
  el.innerHTML = aktifMasalar.map(am => {
    const toplam = (am.siparisler || []).reduce((s,sp) => s + sp.fiyat * sp.adet, 0);
    return `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;" onclick="masaAc(${am.id})">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div style="font-weight:900;color:var(--accent);font-size:0.95rem;">Masa ${am.id} — ${am.ad||'Masa '+am.id}</div>
        <div style="font-weight:900;color:var(--green);">${fmt(toplam)}</div>
      </div>
      ${am.garson ? `<div style="font-size:0.72rem;color:var(--muted);margin-bottom:6px;">👤 ${am.garson}</div>` : ''}
      ${(am.siparisler||[]).map(sp =>
        `<div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--muted);padding:2px 0;">
          <span>${sp.adet}× ${sp.isim}</span>
          <span>${fmt(sp.fiyat * sp.adet)}</span>
        </div>`
      ).join('')}
      ${am.not ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:6px;font-style:italic;">📝 ${am.not}</div>` : ''}
    </div>`;
  }).join('');
}

// ── MASA AÇ ───────────────────────────────────
function masaAc(masaId) {
  aktifMasaId = masaId;
  document.getElementById('masa-liste-ekrani').style.display = 'none';
  document.getElementById('masa-detay-ekrani').style.display = 'block';
  masaDetayRender(masaId);
}

function masaDetayRender(masaId) {
  const masa = masalar.find(m => m.id === masaId);
  const am = aktifMasalar.find(x => x.id === masaId) || {id: masaId, siparisler: [], not: '', garson: ''};

  document.getElementById('detay-masa-adi').textContent = `Masa ${masaId} — ${masa?.ad || 'Masa '+masaId}`;

  const toplam = (am.siparisler || []).reduce((s,sp) => s + sp.fiyat * sp.adet, 0);
  document.getElementById('detay-toplam').textContent = fmt(toplam);
  document.getElementById('masa-not-inp').value = am.not || '';

  const sl = document.getElementById('siparis-liste');
  if (!am.siparisler || !am.siparisler.length) {
    sl.innerHTML = '<div class="bos-durum" style="padding:20px 0;"><div class="bos-ikon" style="font-size:1.8rem;">🍽️</div><div class="bos-yazi">Henüz sipariş yok</div></div>';
  } else {
    sl.innerHTML = am.siparisler.map((sp, idx) => `
      <div class="siparis-item">
        <div class="sp-sol">
          <span class="sp-adet">${sp.adet}×</span>
          <div>
            <div class="sp-isim">${sp.ikon||''} ${sp.isim}</div>
            <div style="font-size:0.72rem;color:var(--muted);">${fmt(sp.fiyat)} / adet</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="sp-fiyat">${fmt(sp.fiyat * sp.adet)}</span>
          <button class="sp-sil" onclick="sipariscikar(${idx})">✕</button>
        </div>
      </div>`).join('');
  }
}

function geriDon() {
  aktifMasaId = null;
  document.getElementById('masa-liste-ekrani').style.display = 'block';
  document.getElementById('masa-detay-ekrani').style.display = 'none';
}

// ── SİPARİŞ EKLE / ÇIKAR ─────────────────────
function sipariscikar(idx) {
  const am = aktifMasalar.find(x => x.id === aktifMasaId);
  if (!am) return;
  am.siparisler.splice(idx, 1);
  masaDetayRender(aktifMasaId);
  masaKaydet(aktifMasaId);
}

async function masaKaydet(masaId) {
  const masa = masalar.find(m => m.id === masaId);
  const am = aktifMasalar.find(x => x.id === masaId);
  const not = document.getElementById('masa-not-inp')?.value || '';

  // Güncel aktif masalar listesini oluştur
  const {data} = await sb.from('kafeler').select('aktif_masalar').eq('id', kafeId).single();
  let aktif = data?.aktif_masalar || [];

  if (am && am.siparisler.length > 0) {
    const masaData = {
      id: masaId, ad: masa?.ad || 'Masa ' + masaId,
      siparisler: am.siparisler, not: not,
      garson: aktifGarson, indirim: 0
    };
    const idx = aktif.findIndex(x => x.id === masaId);
    if (idx >= 0) aktif[idx] = masaData;
    else aktif.push(masaData);
  } else {
    aktif = aktif.filter(x => x.id !== masaId);
    aktifMasalar = aktifMasalar.filter(x => x.id !== masaId);
  }

  await sb.from('kafeler').update({ aktif_masalar: aktif }).eq('id', kafeId);
}

// ── ÜRÜN MODAL ────────────────────────────────
function urunModalAc() {
  seciliUrun = null;
  seciliUrunAdet = 1;
  aktifModalKat = Object.keys(URUNLER)[0] || '';
  document.getElementById('urun-modal').classList.add('ac');
  modalKatRender();
  modalUrunRender();
  document.getElementById('adet-sec').style.display = 'none';
  document.getElementById('modal-ekle-btn').style.display = 'none';
}

function urunModalKapat() {
  document.getElementById('urun-modal').classList.remove('ac');
}

function modalDisi(e) {
  if (e.target === document.getElementById('urun-modal')) urunModalKapat();
}

function modalKatRender() {
  const tabs = document.getElementById('modal-kat-tabs');
  tabs.innerHTML = Object.keys(URUNLER).map(kat =>
    `<button class="mkat ${kat === aktifModalKat ? 'aktif' : ''}" onclick="modalKatSec('${kat}')">${kat}</button>`
  ).join('');
}

function modalKatSec(kat) {
  aktifModalKat = kat;
  seciliUrun = null;
  seciliUrunAdet = 1;
  document.getElementById('adet-sec').style.display = 'none';
  document.getElementById('modal-ekle-btn').style.display = 'none';
  modalKatRender();
  modalUrunRender();
}

function modalUrunRender() {
  const grid = document.getElementById('modal-urun-grid');
  const urunler = URUNLER[aktifModalKat] || [];
  grid.innerHTML = urunler.map((u, idx) => {
    const secili = seciliUrun && seciliUrun.isim === u.isim;
    return `<div class="modal-urun ${secili ? 'secili' : ''}" onclick="urunSec(${idx})">
      ${secili ? `<div class="mu-adet-badge">${seciliUrunAdet}</div>` : ''}
      <div class="mu-ikon">${u.ikon || '🍽️'}</div>
      <div class="mu-isim">${u.isim}</div>
      <div class="mu-fiyat">${u.fiyat} ₺</div>
    </div>`;
  }).join('');
}

function urunSec(idx) {
  const u = (URUNLER[aktifModalKat] || [])[idx];
  if (!u) return;
  seciliUrun = u;
  seciliUrunAdet = 1;
  document.getElementById('adet-sayi').textContent = '1';
  document.getElementById('adet-sec').style.display = 'flex';
  document.getElementById('modal-ekle-btn').style.display = 'block';
  document.getElementById('modal-ekle-btn').textContent = `Ekle → ${fmt(u.fiyat)}`;
  modalUrunRender();
}

function adetDegis(d) {
  seciliUrunAdet = Math.max(1, seciliUrunAdet + d);
  document.getElementById('adet-sayi').textContent = seciliUrunAdet;
  if (seciliUrun) {
    document.getElementById('modal-ekle-btn').textContent =
      `${seciliUrunAdet > 1 ? seciliUrunAdet + '× ' : ''}Ekle → ${fmt(seciliUrun.fiyat * seciliUrunAdet)}`;
  }
  modalUrunRender();
}

function urunEkleOnayla() {
  if (!seciliUrun || !aktifMasaId) return;

  let am = aktifMasalar.find(x => x.id === aktifMasaId);
  if (!am) {
    am = {id: aktifMasaId, siparisler: [], not: '', garson: aktifGarson, indirim: 0};
    aktifMasalar.push(am);
  }

  // Aynı ürün varsa adeti artır
  const var_ = am.siparisler.find(x => x.isim === seciliUrun.isim);
  if (var_) {
    var_.adet += seciliUrunAdet;
  } else {
    am.siparisler.push({
      isim: seciliUrun.isim,
      ikon: seciliUrun.ikon || '',
      fiyat: seciliUrun.fiyat,
      adet: seciliUrunAdet,
      garson: aktifGarson
    });
  }

  urunModalKapat();
  masaDetayRender(aktifMasaId);
  masaKaydet(aktifMasaId);
  toast(`✓ ${seciliUrun.ikon || ''} ${seciliUrun.isim} eklendi`);
}

// ── HESAP KAPAT ───────────────────────────────
async function hesapKapat(odemeTipi) {
  const am = aktifMasalar.find(x => x.id === aktifMasaId);
  if (!am || !am.siparisler || !am.siparisler.length) {
    toast('⚠️ Masada sipariş yok!');
    return;
  }

  const toplam = am.siparisler.reduce((s,sp) => s + sp.fiyat * sp.adet, 0);
  const tipAdi = odemeTipi === 'salon-nakit' ? 'Nakit' : 'Kart';

  if (!confirm(`Masa ${aktifMasaId} hesabı kapatılsın?\nToplam: ${fmt(toplam)}\nÖdeme: ${tipAdi}`)) return;

  // kolaycafenlar tablosuna kaydet
  const not = document.getElementById('masa-not-inp')?.value || '';
  const masa = masalar.find(m => m.id === aktifMasaId);

  await sb.from('kolaycafenlar').insert({
    kafe_id: kafeId,
    masa_no: aktifMasaId,
    masa_ad: masa?.ad || 'Masa ' + aktifMasaId,
    toplam: toplam,
    indirim: 0,
    garson: aktifGarson,
    siparisler: am.siparisler,
    odeme_tipi: odemeTipi,
    musteri_adi: null,
    not: not
  });

  // Masayı aktiflerden çıkar
  aktifMasalar = aktifMasalar.filter(x => x.id !== aktifMasaId);
  const {data} = await sb.from('kafeler').select('aktif_masalar').eq('id', kafeId).single();
  const yeni = (data?.aktif_masalar || []).filter(x => x.id !== aktifMasaId);
  await sb.from('kafeler').update({ aktif_masalar: yeni }).eq('id', kafeId);

  toast(`✓ Hesap kapatıldı — ${fmt(toplam)} ${tipAdi}`);
  geriDon();
  masaGridRender();
}

// ── TAB ───────────────────────────────────────
function tabDegis(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('aktif'));
  document.querySelectorAll('.sayfa').forEach(s => s.classList.remove('aktif'));
  document.getElementById('tab-' + tab).classList.add('aktif');
  document.getElementById('sayfa-' + tab).classList.add('aktif');
  if (tab === 'tum') tumSiparisRender();
}

// ── ÇIKIŞ ─────────────────────────────────────
function cikisYap() {
  if (channel) sb.removeChannel(channel);
  aktifGarson = ''; kafeId = null;
  document.getElementById('ana-ekran').style.display = 'none';
  document.getElementById('giris-ekrani').style.display = 'block';
  document.getElementById('adim-kafe').style.display = 'block';
  document.getElementById('adim-garson').style.display = 'none';
  document.getElementById('adim-pin').style.display = 'none';
  document.getElementById('inp-kafe-kodu').value = '';
}

// ── OTO GİRİŞ (URL parametresi ile) ──────────
(async () => {
  const p = new URLSearchParams(window.location.search);
  const kafeParam = p.get('kafe') || p.get('kafe_kodu');
  if (kafeParam) {
    document.getElementById('inp-kafe-kodu').value = kafeParam;
    await kafeBul();
    // Tek garsonlu kafede otomatik seç
    if (garsonListesi.length === 1 && !garsonListesi[0].pin) {
      garsonSec(0);
    }
  }
})();
</script>
