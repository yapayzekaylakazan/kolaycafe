<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KolayCafe — Mutfak Ekranı</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --surface: #1a1a1a;
      --surface2: #222222;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #666;
      --accent: #f0b940;
      --accent2: #c8922a;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #3b82f6;
      --orange: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      background: var(--bg2);
      border-bottom: 2px solid var(--accent);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent);
    }
    .header-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-kafe {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--muted);
    }
    .saat {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--text);
      font-family: monospace;
      letter-spacing: 2px;
    }
    .online-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Giriş Ekranı */
    #giris-ekrani {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .giris-kart {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .giris-kart h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .giris-kart p { color: var(--muted); font-size: 0.88rem; font-weight: 600; margin-bottom: 24px; }
    .inp {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .inp:focus { border-color: var(--accent); }
    .btn-giris {
      width: 100%;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #1a0f00;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-giris:hover { opacity: 0.85; }
    .giris-err { color: var(--red); font-size: 0.82rem; font-weight: 700; margin-top: 8px; display: none; }

    /* Ana Ekran */
    #ana-ekran { display: none; }

    /* Toolbar */
    .toolbar {
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .toolbar-baslik {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-right: 4px;
    }
    .filtre-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filtre-btn.aktif { background: var(--accent); color: #1a0f00; border-color: var(--accent); }
    .siparis-sayac {
      margin-left: auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .sayac-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 900;
    }
    .sayac-bekliyor { background: #f9731622; color: var(--orange); }
    .sayac-hazirlaniyor { background: #3b82f622; color: var(--blue); }
    .sayac-hazir { background: #22c55e22; color: var(--green); }

    /* Sipariş Grid */
    .siparis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px 24px;
    }

    /* Sipariş Kartı */
    .siparis-kart {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-16px) scale(0.97); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .siparis-kart.bekliyor { border-color: var(--orange); }
    .siparis-kart.hazirlaniyor { border-color: var(--blue); }
    .siparis-kart.hazir { border-color: var(--green); opacity: 0.7; }

    .kart-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kart-header.bekliyor { background: #f9731618; }
    .kart-header.hazirlaniyor { background: #3b82f618; }
    .kart-header.hazir { background: #22c55e18; }

    .masa-bilgi {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .masa-no {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 900;
    }
    .masa-no.bekliyor { color: var(--orange); }
    .masa-no.hazirlaniyor { color: var(--blue); }
    .masa-no.hazir { color: var(--green); }

    .masa-etiket {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--muted);
    }
    .sure-badge {
      font-size: 0.75rem;
      font-weight: 900;
      padding: 3px 10px;
      border-radius: 10px;
      font-family: monospace;
    }
    .sure-badge.bekliyor { background: #f9731622; color: var(--orange); }
    .sure-badge.hazirlaniyor { background: #3b82f622; color: var(--blue); }
    .sure-badge.hazir { background: #22c55e22; color: var(--green); }

    .durum-etiket {
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .durum-etiket.bekliyor { color: var(--orange); }
    .durum-etiket.hazirlaniyor { color: var(--blue); }
    .durum-etiket.hazir { color: var(--green); }

    /* Ürün listesi */
    .urun-liste { padding: 12px 16px; }
    .urun-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .urun-row:last-child { border-bottom: none; }
    .urun-adi {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
    }
    .urun-adet {
      background: var(--surface2);
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 0.78rem;
      font-weight: 900;
      color: var(--accent);
    }
    .musteri-badge {
      font-size: 0.65rem;
      background: #8b5cf622;
      color: #a78bfa;
      padding: 1px 6px;
      border-radius: 6px;
      font-weight: 800;
    }

    /* Not */
    .kart-not {
      margin: 0 16px 12px;
      background: var(--surface);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.78rem;
      color: var(--accent);
      font-weight: 700;
      line-height: 1.5;
    }

    /* Aksiyon Butonları */
    .kart-actions {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }
    .action-btn {
      flex: 1;
      padding: 9px;
      border-radius: 10px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 0.8rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.8; }
    .btn-hazirla { background: #3b82f622; color: var(--blue); border: 1.5px solid var(--blue); }
    .btn-tamamla { background: var(--green); color: #0a0a0a; }
    .btn-iptal { background: #ef444422; color: var(--red); border: 1.5px solid var(--red); }

    /* Boş durum */
    .bos-ekran {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      color: var(--muted);
    }
    .bos-ekran .ikon { font-size: 4rem; margin-bottom: 16px; opacity: 0.4; }
    .bos-ekran h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 8px; }
    .bos-ekran p { font-size: 0.85rem; font-weight: 600; }

    /* Ses butonu */
    .ses-btn {
      padding: 6px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .ses-btn.aktif { border-color: var(--green); color: var(--green); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 0.88rem;
      z-index: 9999;
      animation: toastIn 0.3s ease;
      border: 1px solid var(--border);
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    /* Yeni sipariş bildirimi */
    .yeni-bildirim {
      position: fixed;
      top: 80px;
      right: 24px;
      background: var(--orange);
      color: #1a0f00;
      padding: 14px 20px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 0.95rem;
      z-index: 9998;
      animation: bildirimIn 0.4s ease;
      box-shadow: 0 8px 24px rgba(249,115,22,0.4);
    }
    @keyframes bildirimIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

    @media (max-width: 600px) {
      .siparis-grid { grid-template-columns: 1fr; padding: 12px; }
      .toolbar { padding: 10px 12px; }
    }
  </style>
</head>
<body>

<!-- GİRİŞ EKRANI -->
<div id="giris-ekrani">
  <div class="giris-kart">
    <div style="font-size:2.5rem;margin-bottom:12px;">👨‍🍳</div>
    <h1>Mutfak Ekranı</h1>
    <p>Cafe kodunuzu girerek mutfak ekranını açın</p>
    <input class="inp" id="kafe-kodu-inp" type="text" placeholder="Cafe kodu (örn: aliusta)" autocomplete="off">
    <button class="btn-giris" onclick="mutfakGiris()">🍳 Mutfak Ekranını Aç</button>
    <div class="giris-err" id="giris-err"></div>
  </div>
</div>

<!-- ANA MUTFAK EKRANI -->
<div id="ana-ekran">
  <!-- Header -->
  <div class="header">
    <div class="header-logo">🍳 Mutfak</div>
    <div class="header-info">
      <div class="header-kafe" id="header-kafe-adi"></div>
      <div class="saat" id="saat-display"></div>
      <button class="ses-btn aktif" id="ses-btn" onclick="sesToggle()">🔔 Ses Açık</button>
      <div class="online-dot" id="online-dot"></div>
    </div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <span class="toolbar-baslik">Filtrele:</span>
    <button class="filtre-btn aktif" data-filtre="hepsi" onclick="filtreAyarla('hepsi', this)">Tümü</button>
    <button class="filtre-btn" data-filtre="bekliyor" onclick="filtreAyarla('bekliyor', this)">⏳ Bekliyor</button>
    <button class="filtre-btn" data-filtre="hazirlaniyor" onclick="filtreAyarla('hazirlaniyor', this)">👨‍🍳 Hazırlanıyor</button>
    <button class="filtre-btn" data-filtre="hazir" onclick="filtreAyarla('hazir', this)">✅ Hazır</button>
    <div class="siparis-sayac">
      <span class="sayac-badge sayac-bekliyor" id="sayac-bekliyor">⏳ 0</span>
      <span class="sayac-badge sayac-hazirlaniyor" id="sayac-hazirlaniyor">👨‍🍳 0</span>
      <span class="sayac-badge sayac-hazir" id="sayac-hazir">✅ 0</span>
    </div>
  </div>

  <!-- Sipariş Grid -->
  <div class="siparis-grid" id="siparis-grid"></div>
</div>

<script>
const SUPABASE_URL = 'https://sjfcdthwlwmbdmcevobv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqZmNkdGh3bHdtYmRtY2V2b2J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MDA3OTYsImV4cCI6MjA4NzM3Njc5Nn0.B--4Quy58qdU1IK48U-pr25hKoesqViMR0QvxNBiRbs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let mutfakKafeId = null;
let mutfakKafeAdi = '';
let aktifFiltre = 'hepsi';
let sesAcik = true;
let siparisler = []; // [{id, masaNo, masaAdi, urunler, durum, zaman, not}]
let oncekiSiparisSayisi = 0;
let subscription = null;

// Saat güncelle
setInterval(() => {
  const el = document.getElementById('saat-display');
  if (el) el.textContent = new Date().toLocaleTimeString('tr-TR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

// Süre hesapla
function sureFmt(ms) {
  const sn = Math.floor(ms / 1000);
  const dk = Math.floor(sn / 60);
  if (dk >= 60) return Math.floor(dk/60) + 's ' + (dk%60) + 'dk';
  if (dk > 0) return dk + 'dk ' + (sn%60) + 'sn';
  return sn + 'sn';
}

// Süre rengi
function sureRenk(ms, durum) {
  if (durum === 'hazir') return 'hazir';
  if (durum === 'hazirlaniyor') return 'hazirlaniyor';
  const dk = ms / 60000;
  return 'bekliyor';
}

// Toast
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Bildirim
function bildirimGoster(masaAdi, adet) {
  const b = document.createElement('div');
  b.className = 'yeni-bildirim';
  b.innerHTML = '🔥 Yeni Sipariş! <br><span style="font-size:0.82rem;font-weight:700;">' + masaAdi + ' — ' + adet + ' ürün</span>';
  document.body.appendChild(b);
  setTimeout(() => b.remove(), 4000);

  if (sesAcik) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      [523, 659, 784].forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.3);
      });
    } catch(e) {}
  }
}

// Giriş
async function mutfakGiris() {
  const kod = document.getElementById('kafe-kodu-inp').value.trim().toLowerCase();
  if (!kod) { document.getElementById('giris-err').textContent = 'Cafe kodu girin!'; document.getElementById('giris-err').style.display = 'block'; return; }

  const {data, error} = await sb.from('kafeler')
    .select('id, kafe_adi, masalar')
    .eq('kafe_kodu', kod)
    .single();

  if (error || !data) {
    document.getElementById('giris-err').textContent = 'Cafe bulunamadı!';
    document.getElementById('giris-err').style.display = 'block';
    return;
  }

  mutfakKafeId = data.id;
  mutfakKafeAdi = data.kafe_adi;
  localStorage.setItem('mutfak_kafe_id', data.id);
  localStorage.setItem('mutfak_kafe_kodu', kod);

  document.getElementById('giris-ekrani').style.display = 'none';
  document.getElementById('ana-ekran').style.display = 'block';
  document.getElementById('header-kafe-adi').textContent = mutfakKafeAdi;

  await siparisleriYukle();
  realTimeBaglan();
}

// Siparişleri yükle ve işle
async function siparisleriYukle() {
  const {data} = await sb.from('kafeler')
    .select('masalar, kafe_adi')
    .eq('id', mutfakKafeId)
    .single();

  if (!data) return;

  const masalar = data.masalar || [];
  const yeniSiparisler = [];

  masalar.forEach(masa => {
    if (!masa.siparisler || masa.siparisler.length === 0) return;

    // Müşteri siparişlerini al
    const musteriSiparisler = masa.siparisler.filter(s => s.musteri === true);
    if (musteriSiparisler.length === 0) return;

    // Ürünleri grupla
    const gruplu = {};
    musteriSiparisler.forEach(s => {
      const key = s.isim;
      if (!gruplu[key]) gruplu[key] = {isim: s.isim, ikon: s.ikon||'🍽', adet: 0, fiyat: s.fiyat};
      gruplu[key].adet++;
    });

    // Durum: masa.mutfak_durum'dan oku, yoksa 'bekliyor'
    const durum = masa.mutfak_durum || 'bekliyor';
    
    // Sipariş zamanı
    const ilkSiparis = musteriSiparisler[0];
    const zamanMs = masa.mutfak_zaman ? new Date(masa.mutfak_zaman).getTime() : Date.now();

    yeniSiparisler.push({
      id: 'masa_' + masa.id,
      masaNo: masa.id,
      masaAdi: masa.ad || ('Masa ' + masa.id),
      urunler: Object.values(gruplu),
      durum: durum,
      zaman: zamanMs,
      not: masa.not || '',
    });
  });

  // Yeni sipariş bildirimi
  const eskiBekleyenSayisi = siparisler.filter(s=>s.durum==='bekliyor').length;
  const yeniBekleyenSayisi = yeniSiparisler.filter(s=>s.durum==='bekliyor').length;
  if (yeniBekleyenSayisi > eskiBekleyenSayisi) {
    const yeniGelen = yeniSiparisler.filter(s => s.durum==='bekliyor' && !siparisler.find(e=>e.id===s.id));
    yeniGelen.forEach(s => bildirimGoster(s.masaAdi, s.urunler.reduce((t,u)=>t+u.adet,0)));
  }

  siparisler = yeniSiparisler;
  siparisleriRender();
}

// Render
function siparisleriRender() {
  const grid = document.getElementById('siparis-grid');
  const filtreli = aktifFiltre === 'hepsi' ? siparisler : siparisler.filter(s => s.durum === aktifFiltre);

  // Sayaçlar
  document.getElementById('sayac-bekliyor').textContent = '⏳ ' + siparisler.filter(s=>s.durum==='bekliyor').length;
  document.getElementById('sayac-hazirlaniyor').textContent = '👨‍🍳 ' + siparisler.filter(s=>s.durum==='hazirlaniyor').length;
  document.getElementById('sayac-hazir').textContent = '✅ ' + siparisler.filter(s=>s.durum==='hazir').length;

  if (filtreli.length === 0) {
    grid.innerHTML = `
      <div class="bos-ekran" style="grid-column:1/-1;">
        <div class="ikon">🍳</div>
        <h3>Bekleyen sipariş yok</h3>
        <p>Yeni sipariş geldiğinde burada görünecek</p>
      </div>`;
    return;
  }

  grid.innerHTML = '';
  // Sıralama: bekliyor > hazirlaniyor > hazir
  const sirali = [...filtreli].sort((a,b) => {
    const siralama = {bekliyor:0, hazirlaniyor:1, hazir:2};
    return (siralama[a.durum]||0) - (siralama[b.durum]||0);
  });

  sirali.forEach(s => {
    const sure = sureFmt(Date.now() - s.zaman);
    const kart = document.createElement('div');
    kart.className = 'siparis-kart ' + s.durum;
    kart.dataset.id = s.id;

    const durumEtiket = s.durum === 'bekliyor' ? '⏳ Bekliyor' : s.durum === 'hazirlaniyor' ? '👨‍🍳 Hazırlanıyor' : '✅ Hazır';
    const urunlerHTML = s.urunler.map(u => `
      <div class="urun-row">
        <div class="urun-adi">
          <span>${u.ikon}</span>
          <span>${u.isim}</span>
          <span class="musteri-badge">Müşteri</span>
        </div>
        <span class="urun-adet">x${u.adet}</span>
      </div>`).join('');

    const notHTML = s.not ? `<div class="kart-not">📝 ${s.not}</div>` : '';

    const aksiyonHTML = s.durum === 'bekliyor' ? `
      <button class="action-btn btn-hazirla" onclick="durumGuncelle('${s.masaNo}', 'hazirlaniyor')">👨‍🍳 Hazırlanıyor</button>
      <button class="action-btn btn-iptal" onclick="durumGuncelle('${s.masaNo}', 'iptal')">✕ İptal</button>` :
      s.durum === 'hazirlaniyor' ? `
      <button class="action-btn btn-tamamla" onclick="durumGuncelle('${s.masaNo}', 'hazir')">✅ Hazır!</button>
      <button class="action-btn btn-iptal" onclick="durumGuncelle('${s.masaNo}', 'iptal')">✕ İptal</button>` :
      `<button class="action-btn btn-tamamla" style="background:#22c55e33;color:var(--green);border:1.5px solid var(--green);" onclick="siparisiTemizle('${s.masaNo}')">🏁 Teslim Edildi</button>`;

    kart.innerHTML = `
      <div class="kart-header ${s.durum}">
        <div class="masa-bilgi">
          <div>
            <div class="masa-no ${s.durum}">${s.masaAdi}</div>
            <div class="masa-etiket"><span class="durum-etiket ${s.durum}">${durumEtiket}</span></div>
          </div>
        </div>
        <span class="sure-badge ${s.durum}">${sure}</span>
      </div>
      <div class="urun-liste">${urunlerHTML}</div>
      ${notHTML}
      <div class="kart-actions">${aksiyonHTML}</div>`;

    grid.appendChild(kart);
  });
}

// Durum güncelle
async function durumGuncelle(masaNo, yeniDurum) {
  const {data} = await sb.from('kafeler').select('masalar').eq('id', mutfakKafeId).single();
  const masalar = data?.masalar || [];
  const masa = masalar.find(m => m.id === parseInt(masaNo));
  if (!masa) return;

  if (yeniDurum === 'iptal') {
    masa.siparisler = (masa.siparisler || []).filter(s => !s.musteri);
    masa.mutfak_durum = null;
    masa.mutfak_zaman = null;
    toast('❌ Sipariş iptal edildi');
  } else {
    masa.mutfak_durum = yeniDurum;
    if (yeniDurum === 'hazirlaniyor') {
      toast('👨‍🍳 Hazırlanıyor!');
    } else if (yeniDurum === 'hazir') {
      toast('✅ Hazır! Garson bilgilendirildi');
    }
  }

  await sb.from('kafeler').update({masalar}).eq('id', mutfakKafeId);
  await siparisleriYukle();
}

// Teslim edildi - siparişi masadan temizle, ana uygulamaya al
async function siparisiTemizle(masaNo) {
  const {data} = await sb.from('kafeler').select('masalar').eq('id', mutfakKafeId).single();
  const masalar = data?.masalar || [];
  const masa = masalar.find(m => m.id === parseInt(masaNo));
  if (!masa) return;

  // Müşteri flagini kaldır (ana sisteme taşı)
  masa.siparisler = (masa.siparisler || []).map(s => s.musteri ? {...s, musteri: false} : s);
  masa.mutfak_durum = null;
  masa.mutfak_zaman = null;

  await sb.from('kafeler').update({masalar}).eq('id', mutfakKafeId);
  toast('🏁 Teslim edildi! Masa hesabına eklendi');
  await siparisleriYukle();
}

// Filtre
function filtreAyarla(filtre, btn) {
  aktifFiltre = filtre;
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('aktif'));
  btn.classList.add('aktif');
  siparisleriRender();
}

// Ses toggle
function sesToggle() {
  sesAcik = !sesAcik;
  const btn = document.getElementById('ses-btn');
  btn.textContent = sesAcik ? '🔔 Ses Açık' : '🔕 Ses Kapalı';
  btn.classList.toggle('aktif', sesAcik);
  toast(sesAcik ? '🔔 Ses açıldı' : '🔕 Ses kapatıldı');
}

// Realtime bağlantı
function realTimeBaglan() {
  if (subscription) subscription.unsubscribe();
  subscription = sb.channel('mutfak-' + mutfakKafeId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'kafeler',
      filter: 'id=eq.' + mutfakKafeId
    }, async () => {
      await siparisleriYukle();
    })
    .subscribe();

  // Her 30sn de bir süreleri güncelle
  setInterval(() => siparisleriRender(), 30000);
}

// Sayfa yüklenince kayıtlı kafe kodunu kontrol et
(async function() {
  const kaydedilmisId = localStorage.getItem('mutfak_kafe_id');
  const kaydedilmisKod = localStorage.getItem('mutfak_kafe_kodu');
  if (kaydedilmisId && kaydedilmisKod) {
    document.getElementById('kafe-kodu-inp').value = kaydedilmisKod;
    mutfakKafeId = kaydedilmisId;
    const {data} = await sb.from('kafeler').select('kafe_adi').eq('id', kaydedilmisId).single();
    if (data) {
      mutfakKafeAdi = data.kafe_adi;
      document.getElementById('giris-ekrani').style.display = 'none';
      document.getElementById('ana-ekran').style.display = 'block';
      document.getElementById('header-kafe-adi').textContent = mutfakKafeAdi;
      await siparisleriYukle();
      realTimeBaglan();
    }
  }
})();
</script>
